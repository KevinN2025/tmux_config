set -g default-terminal "xterm-256color"
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 100000

# Status bar at top
set -g status-position top
set -g status-style "bg=#1e1e1e,fg=#9a9a9a"

# Left: session name with icon
set -g status-left "#[fg=#e8e8e8,bg=#444444,bold]  #S #[fg=#444444,bg=#1e1e1e,nobold] "
set -g status-left-length 30

# Right: clock + date with icons
set -g status-right "#[fg=#666666]  %H:%M    %d %b "
set -g status-right-length 28

# Window tabs as little boxes
set -g window-status-separator " "
set -g window-status-format "#[bg=#2d2d2d,fg=#787878] #I #W "
set -g window-status-current-format "#[bg=#4a4a4a,fg=#e8e8e8,bold] #I #W "
set -g window-status-activity-style "fg=#c8b866,bg=#2d2d2d"

unbind C-b
set -g prefix C-x
bind C-x send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R 

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
